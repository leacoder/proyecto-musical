<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synth App</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Overlay: se muestra hasta que el usuario active el AudioContext -->
    <div id="overlay">
      <div class="overlay-inner">
        <div class="overlay-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </div>
        <div class="overlay-title">Haz clic para activar el audio</div>
        <div class="overlay-subtitle">Requiere interacción del usuario por política del navegador</div>
      </div>
    </div>

    <!-- Header -->
    <header id="app-header">
      <div>
        <div class="app-title">Synth App</div>
        <div class="app-subtitle">Sintetizador · Drum Machine · Secuenciador</div>
      </div>
      <div id="header-controls">
        <button id="btn-panic" class="btn-danger">■ Pánico</button>
      </div>
    </header>

    <!-- Contenido principal: los módulos se renderizan via JS -->
    <main id="app-main">
      <!-- Los módulos se inyectan aquí por main.js -->
      <div id="synth-controls-root"></div>
      <div id="keyboard-root">
        <div class="section">
          <div class="section-title">Teclado — A W S E D F T G Y H U J K</div>
          <div id="keyboard-container"></div>
        </div>
      </div>
      <div id="drums-root"></div>
      <div id="sequencer-root"></div>
      <div id="effects-root"></div>
      <div id="mixer-root"></div>
      <div id="scope-root"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
